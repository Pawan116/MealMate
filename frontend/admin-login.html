<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" type="image/png" href="icon.png">
</head>
<body class="page-login">

  <div class="page-layout">

    <div class="right-panel">
      <div class="form-title">Admin Login 🧑‍💼</div>
      <div class="form-sub">Sign in as administrator</div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="adminEmail" placeholder="Enter admin email"/>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="adminPassword" placeholder="••••••••"/>
      </div>

      <button class="btn-primary" onclick="loginAdmin()">Login</button>

    </div>

  </div>

  <script src="js/admin.js"></script>
</body>
</html>
